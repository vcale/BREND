<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Generador de Guiones</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@mui/material@5.15.10/umd/material-ui.development.js"></script>
  <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState } = React;
    const { Container, Typography, FormControl, InputLabel, Select, MenuItem, Button, Box, CircularProgress } = MaterialUI;

    function App() {
      const [formData, setFormData] = useState({
        contentType: '', platform: '', tone: '', targetAge: '', targetAudience: '',
        contentGoal: '', region: '', scriptLength: '', additionalInfo: ''
      });
      const [result, setResult] = useState(null);
      const [loading, setLoading] = useState(false);

      const handleChange = (e) => {
        setFormData({ ...formData, [e.target.name]: e.target.value });
      };

      const handleSubmit = async () => {
        setLoading(true);
        const response = await fetch('/generate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(formData),
        });
        const data = await response.json();
        setResult(data);
        setLoading(false);
      };

      return (
        <Container maxWidth="sm" style={{ padding: '20px', backgroundColor: '#f5f5f5', borderRadius: '10px' }}>
          <Typography variant="h4" gutterBottom style={{ color: '#1976d2' }}>
            Generador de Guiones
          </Typography>

          <FormControl fullWidth margin="normal">
            <InputLabel>Tipo de Contenido</InputLabel>
            <Select name="contentType" value={formData.contentType} onChange={handleChange}>
              <MenuItem value="video">Video</MenuItem>
              <MenuItem value="artículo">Artículo</MenuItem>
              <MenuItem value="podcast">Podcast</MenuItem>
            </Select>
          </FormControl>

          <FormControl fullWidth margin="normal">
            <InputLabel>Plataforma</InputLabel>
            <Select name="platform" value={formData.platform} onChange={handleChange}>
              <MenuItem value="YouTube">YouTube</MenuItem>
              <MenuItem value="TikTok">TikTok</MenuItem>
              <MenuItem value="Blog">Blog</MenuItem>
            </Select>
          </FormControl>

          <FormControl fullWidth margin="normal">
            <InputLabel>Tono</InputLabel>
            <Select name="tone" value={formData.tone} onChange={handleChange}>
              <MenuItem value="formal">Formal</MenuItem>
              <MenuItem value="informal">Informal</MenuItem>
              <MenuItem value="humorístico">Humorístico</MenuItem>
            </Select>
          </FormControl>

          <FormControl fullWidth margin="normal">
            <InputLabel>Edad del Público</InputLabel>
            <Select name="targetAge" value={formData.targetAge} onChange={handleChange}>
              <MenuItem value="18-24">18-24</MenuItem>
              <MenuItem value="25-34">25-34</MenuItem>
              <MenuItem value="35-44">35-44</MenuItem>
            </Select>
          </FormControl>

          <FormControl fullWidth margin="normal">
            <InputLabel>Público Objetivo</InputLabel>
            <Select name="targetAudience" value={formData.targetAudience} onChange={handleChange}>
              <MenuItem value="estudiantes">Estudiantes</MenuItem>
              <MenuItem value="profesionales">Profesionales</MenuItem>
              <MenuItem value="padres">Padres</MenuItem>
            </Select>
          </FormControl>

          <FormControl fullWidth margin="normal">
            <InputLabel>Objetivo del Contenido</InputLabel>
            <Select name="contentGoal" value={formData.contentGoal} onChange={handleChange}>
              <MenuItem value="informar">Informar</MenuItem>
              <MenuItem value="entretener">Entretener</MenuItem>
              <MenuItem value="persuadir">Persuadir</MenuItem>
            </Select>
          </FormControl>

          <FormControl fullWidth margin="normal">
            <InputLabel>Región</InputLabel>
            <Select name="region" value={formData.region} onChange={handleChange}>
              <MenuItem value="México">México</MenuItem>
              <MenuItem value="España">España</MenuItem>
              <MenuItem value="Colombia">Colombia</MenuItem>
            </Select>
          </FormControl>

          <FormControl fullWidth margin="normal">
            <InputLabel>Longitud del Guión</InputLabel>
            <Select name="scriptLength" value={formData.scriptLength} onChange={handleChange}>
              <MenuItem value="corto">Corto (2 min)</MenuItem>
              <MenuItem value="medio">Medio (5 min)</MenuItem>
              <MenuItem value="largo">Largo (10 min)</MenuItem>
            </Select>
          </FormControl>

          <Button
            variant="contained"
            color="primary"
            onClick={handleSubmit}
            disabled={loading}
            style={{ marginTop: '20px', backgroundColor: '#1976d2' }}
          >
            {loading ? <CircularProgress size={24} color="inherit" /> : 'Generar Contenido'}
          </Button>

          {result && (
            <Box mt={4} p={2} style={{ backgroundColor: '#fff', borderRadius: '8px' }}>
              <Typography variant="h6">Guión Generado</Typography>
              <Typography>{result.script}</Typography>
              <Typography variant="h6">Recomendaciones</Typography>
              <ul>{result.recommendations.map((rec, i) => <li key={i}>{rec}</li>)}</ul>
              <Typography variant="h6">Evaluación</Typography>
              <Typography>Viralidad: {result.viralityScore}/10</Typography>
              <Typography>Calidad: {result.qualityScore}/10</Typography>
              <Typography variant="h6">Razones</Typography>
              <ul>{result.reasons.map((reason, i) => <li key={i}>{reason}</li>)}</ul>
            </Box>
          )}
        </Container>
      );
    }

    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
