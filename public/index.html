
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Generador de Guiones</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@mui/material@5.15.10/umd/material-ui.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Roboto:300,400,500,700&display=swap" />
  <style>
    body { margin: 0; font-family: 'Roboto', sans-serif; }
    .container { padding: 20px; }
    .form-field { margin-bottom: 15px; }
    .results { margin-top: 30px; padding: 20px; background-color: #f5f5f5; border-radius: 4px; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { 
      Button, TextField, Container, Box, Typography, 
      FormControl, InputLabel, Select, MenuItem, 
      CircularProgress, Paper 
    } = MaterialUI;

    function App() {
      const [formData, setFormData] = React.useState({
        contentType: 'video',
        platform: 'TikTok',
        tone: 'humorístico',
        targetAge: '18-25',
        targetAudience: 'jóvenes interesados en tecnología',
        contentGoal: 'entretener y educar',
        region: 'España',
        scriptLength: 'medio (1-2 minutos)',
        additionalInfo: '',
      });
      
      const [loading, setLoading] = React.useState(false);
      const [result, setResult] = React.useState(null);

      const handleChange = (e) => {
        const { name, value } = e.target;
        setFormData({
          ...formData,
          [name]: value,
        });
      };

      const handleSubmit = async (e) => {
        e.preventDefault();
        setLoading(true);
        try {
          const response = await fetch('/generate', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(formData),
          });
          const data = await response.json();
          setResult(data);
        } catch (error) {
          console.error('Error:', error);
        } finally {
          setLoading(false);
        }
      };

      return (
        <Container maxWidth="md">
          <Box my={4}>
            <Typography variant="h4" component="h1" gutterBottom>
              Generador de Guiones para Contenido
            </Typography>
            
            <Paper elevation={3} sx={{ p: 3, mb: 4 }}>
              <form onSubmit={handleSubmit}>
                <FormControl fullWidth margin="normal">
                  <InputLabel>Tipo de Contenido</InputLabel>
                  <Select
                    name="contentType"
                    value={formData.contentType}
                    onChange={handleChange}
                    label="Tipo de Contenido"
                  >
                    <MenuItem value="video">Video</MenuItem>
                    <MenuItem value="reel">Reel</MenuItem>
                    <MenuItem value="storie">Storie</MenuItem>
                    <MenuItem value="podcast">Podcast</MenuItem>
                  </Select>
                </FormControl>

                <FormControl fullWidth margin="normal">
                  <InputLabel>Plataforma</InputLabel>
                  <Select
                    name="platform"
                    value={formData.platform}
                    onChange={handleChange}
                    label="Plataforma"
                  >
                    <MenuItem value="TikTok">TikTok</MenuItem>
                    <MenuItem value="Instagram">Instagram</MenuItem>
                    <MenuItem value="YouTube">YouTube</MenuItem>
                    <MenuItem value="Twitch">Twitch</MenuItem>
                  </Select>
                </FormControl>

                <FormControl fullWidth margin="normal">
                  <InputLabel>Tono</InputLabel>
                  <Select
                    name="tone"
                    value={formData.tone}
                    onChange={handleChange}
                    label="Tono"
                  >
                    <MenuItem value="humorístico">Humorístico</MenuItem>
                    <MenuItem value="informativo">Informativo</MenuItem>
                    <MenuItem value="inspirador">Inspirador</MenuItem>
                    <MenuItem value="educativo">Educativo</MenuItem>
                  </Select>
                </FormControl>

                <TextField
                  fullWidth
                  margin="normal"
                  label="Edad Objetivo"
                  name="targetAge"
                  value={formData.targetAge}
                  onChange={handleChange}
                />

                <TextField
                  fullWidth
                  margin="normal"
                  label="Audiencia Objetivo"
                  name="targetAudience"
                  value={formData.targetAudience}
                  onChange={handleChange}
                />

                <TextField
                  fullWidth
                  margin="normal"
                  label="Objetivo del Contenido"
                  name="contentGoal"
                  value={formData.contentGoal}
                  onChange={handleChange}
                />

                <TextField
                  fullWidth
                  margin="normal"
                  label="Región"
                  name="region"
                  value={formData.region}
                  onChange={handleChange}
                />

                <FormControl fullWidth margin="normal">
                  <InputLabel>Longitud del Guión</InputLabel>
                  <Select
                    name="scriptLength"
                    value={formData.scriptLength}
                    onChange={handleChange}
                    label="Longitud del Guión"
                  >
                    <MenuItem value="corto (30-60 segundos)">Corto (30-60 segundos)</MenuItem>
                    <MenuItem value="medio (1-2 minutos)">Medio (1-2 minutos)</MenuItem>
                    <MenuItem value="largo (2-5 minutos)">Largo (2-5 minutos)</MenuItem>
                  </Select>
                </FormControl>

                <TextField
                  fullWidth
                  margin="normal"
                  label="Información Adicional (opcional)"
                  name="additionalInfo"
                  multiline
                  rows={4}
                  value={formData.additionalInfo}
                  onChange={handleChange}
                />

                <Button
                  type="submit"
                  variant="contained"
                  color="primary"
                  fullWidth
                  size="large"
                  disabled={loading}
                  sx={{ mt: 3 }}
                >
                  {loading ? <CircularProgress size={24} /> : "Generar Guión"}
                </Button>
              </form>
            </Paper>

            {result && (
              <Box mt={4} p={3} bgcolor="#f8f9fa" borderRadius={2}>
                <Typography variant="h5">Guión Generado</Typography>
                <Typography
                  component="pre"
                  sx={{
                    whiteSpace: "pre-wrap",
                    backgroundColor: "#eaeaea",
                    p: 2,
                    borderRadius: 1,
                    my: 2
                  }}
                >
                  {result.script}
                </Typography>
                <Typography variant="h6">Recomendaciones</Typography>
                <ul>{result.recommendations.map((rec, i) => <li key={i}>{rec}</li>)}</ul>
                <Typography variant="h6">Evaluación</Typography>
                <Typography>Viralidad: {result.viralityScore}/10</Typography>
                <Typography>Calidad: {result.qualityScore}/10</Typography>
                <Typography variant="h6">Razones</Typography>
                <ul>{result.reasons.map((reason, i) => <li key={i}>{reason}</li>)}</ul>
              </Box>
            )}
          </Box>
        </Container>
      );
    }

    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
